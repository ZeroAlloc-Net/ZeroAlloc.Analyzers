next-version: 1.0.0
mode: ContinuousDeployment
major-version-bump-message: "^(feat|fix|refactor|perf)(\\(.*\\))?!:|BREAKING CHANGE"
minor-version-bump-message: "^feat(\\(.*\\))?:"
patch-version-bump-message: "^(fix|docs|test|ci|chore|refactor|perf)(\\(.*\\))?:"
branches:
  main:
    label: ''
    increment: Patch
    is-main-branch: true
    regex: ^master$|^main$
  feature:
    label: '{BranchName}'
    increment: Minor
    regex: ^features?[/-](?<BranchName>.+)
    source-branches:
    - main
  pull-request:
    mode: ContinuousDelivery
    label: PullRequest{Number}
    increment: Inherit
    regex: ^(pull-requests|pull|pr)[/-](?<Number>\d*)
    source-branches:
    - main
    - feature
