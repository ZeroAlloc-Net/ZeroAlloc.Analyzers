name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Calculate version
        id: gitversion
        run: |
          version=$(dotnet dotnet-gitversion /output json /showvariable SemVer)
          echo "semver=$version" >> $GITHUB_OUTPUT
          echo "Releasing version: $version"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Pack
        run: >-
          dotnet pack src/ZeroAlloc.Analyzers.Package/ZeroAlloc.Analyzers.Package.csproj
          -c Release
          --no-build
          -p:PackageVersion=${{ steps.gitversion.outputs.semver }}

      - name: Push to NuGet
        run: >-
          dotnet nuget push
          src/ZeroAlloc.Analyzers.Package/bin/Release/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create tag
        run: |
          git tag "v${{ steps.gitversion.outputs.semver }}"
          git push origin "v${{ steps.gitversion.outputs.semver }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semver }}
          generate_release_notes: true
          files: src/ZeroAlloc.Analyzers.Package/bin/Release/*.nupkg
